{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 相和化工管理系统</title>
<link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            background: white;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h3 {
            color: #0d6efd; /* Bootstrap Primary Blue */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h3>🧪 相和化工</h3>
        <p class="text-muted">生产库存管理系统</p>
    </div>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger py-2" role="alert">
                账号或密码错误，请重试。
            </div>
        {% endif %}

        <div class="mb-3">
            <label for="id_username" class="form-label">账号</label>
            <input type="text" name="username" class="form-control" id="id_username"
                   placeholder="请输入工号/用户名" required autofocus>
        </div>

        <div class="mb-3">
            <label for="id_password" class="form-label">密码</label>
            <input type="password" name="password" class="form-control" id="id_password"
                   placeholder="请输入密码" required>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">登 录</button>
        </div>
    </form>

    <div class="mt-4 text-center text-muted small">
        &copy; 2026 Xianghe Chemical. All rights reserved.
    </div>
</div>

</body>
</html>

{% load static %}
<div class="batch-source-component bg-white border rounded-3 p-3 shadow-sm mb-3">
    <label class="small text-primary fw-bold text-uppercase mb-2 d-flex justify-content-between align-items-center">
        <span><i class="bi bi-diagram-3 me-1"></i> 多批次粗品投入 (Input Sources)</span>
        <span class="badge bg-primary bg-opacity-10 text-primary">智能感应列表</span>
    </label>

    <script id="available-sources-data" type="application/json">
        {{ available_sources_json|safe|default:"[]" }}
    </script>

    <div class="table-responsive" style="overflow-visible: true;">
<table class="table table-sm table-borderless align-top mb-2" id="batchSourceTable">
            <thead class="border-bottom border-light">
            <tr class="text-muted small">
                <th style="width: 55%;" class="fw-normal ps-1">粗正品批次号</th>
                <th style="width: 35%;" class="fw-normal">投入重量</th>
                <th style="width: 10%;" class="text-center fw-normal"><i class="bi bi-gear"></i></th>
            </tr>
            </thead>
            <tbody id="batchSourceBody">
            {% if form.instance.pk %}
                {% for item in form.instance.inputs.all %}
                    <tr class="source-row border-bottom border-light border-opacity-50">
                        <td class="ps-0 py-2">
                            <input type="text" class="form-control form-control-sm font-monospace batch-input bg-light"
                                   list="availableBatches" autocomplete="off"
                                   name="source_batch_no" value="{{ item.source_batch.batch_no }}" required
                                   placeholder="输入或下拉选择批号"
                                   {% if form.instance.status != 'new' %}readonly{% endif %}>
                            <div class="batch-info-container mt-1" style="font-size: 0.75rem;"></div>
                        </td>
                        <td class="py-2">
                            <div class="input-group input-group-sm">
                                <input type="number" step="0.1" min="0.1" class="form-control use-weight-input bg-light"
                                       name="source_use_weight" value="{{ item.use_weight }}" required
                                       {% if form.instance.status != 'new' %}readonly{% endif %}>
                                <span class="input-group-text bg-white border-start-0 text-muted">kg</span>
                            </div>
                        </td>
                        <td class="text-center py-2 pe-0">
                            {% if form.instance.status == 'new' %}
                                <button type="button" class="btn btn-sm btn-outline-danger remove-row-btn" tabindex="-1" title="移除">
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
            {% endif %}
            </tbody>
        </table>
    </div>

    {% if form.instance.status == 'new' or not form.instance.pk %}
        <div class="d-flex justify-content-between align-items-center mt-2 border-top pt-2">
            <button type="button" class="btn btn-sm btn-outline-primary" id="addBatchRowBtn">
                <i class="bi bi-plus-lg me-1"></i> 添加源批次
            </button>
            <div class="small fw-bold text-secondary">
                合计投入: <span id="totalInputWeight" class="text-primary font-monospace fs-6 ms-1">0.0</span> kg
            </div>
        </div>
    {% endif %}
</div>

<template id="batchSourceRowTemplate">
    <tr class="source-row border-bottom border-light border-opacity-50">
        <td class="ps-0 py-2">
            <input type="text" class="form-control form-control-sm font-monospace batch-input"
                   list="availableBatches" autocomplete="off"
                   name="source_batch_no" required placeholder="输入或下拉选择批号">
            <div class="batch-info-container mt-1" style="font-size: 0.75rem;"></div>
        </td>
        <td class="py-2">
            <div class="input-group input-group-sm">
                <input type="number" step="0.1" min="0.1" class="form-control use-weight-input"
                       name="source_use_weight" required placeholder="0.0">
                <span class="input-group-text bg-light border-start-0 text-muted">kg</span>
            </div>
        </td>
        <td class="text-center py-2 pe-0">
            <button type="button" class="btn btn-sm btn-outline-danger remove-row-btn" tabindex="-1" title="移除">
                <i class="bi bi-trash"></i> 删除
            </button>
        </td>
    </tr>
</template>
<script src="{% static 'js/production/partials/_batch_source_input.js' %}"></script>

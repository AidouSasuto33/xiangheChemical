<div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="labor-table">
        <thead class="table-light text-secondary">
            <tr>
                <th style="width: 25%">工种 / 费用项</th>
                <th style="width: 12%" class="text-center">人数</th>
                <th style="width: 15%" class="text-center">耗时 (H)</th>
                <th style="width: 15%" class="text-center">金额 (元)</th>
                <th style="width: 15%">记录日期</th>
                <th style="width: 18%" class="text-center">操作</th>
            </tr>
        </thead>
        <tbody id="labor-tbody">

            {% for record in labor_records %}
            <tr class="labor-row is-locked">
                <input type="hidden" name="labor_record_id" value="{{ record.id }}">

                <td>
                    <select name="labor_config_id" class="form-select bg-light labor-calc-trigger" style="pointer-events: none;">
                        <option value="{{ record.cost_config.id }}" data-price="{{ record.cost_snapshot }}" selected>
                            {{ record.cost_config.label }}
                        </option>
                        {% for config in labor_cost_configs %}
                            {% if config.id != record.cost_config.id %}
                                <option value="{{ config.id }}" data-price="{{ config.price }}">{{ config.label }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input type="number" name="worker_count" class="form-control text-center bg-light labor-calc-trigger" value="{{ record.worker_count }}" min="1" readonly required>
                </td>
                <td>
                    <input type="number" step="0.5" name="work_hours" class="form-control text-center bg-light labor-calc-trigger" value="{{ record.work_hours }}" min="0.5" readonly required>
                </td>
                <td class="text-center">
                    <span class="fw-bold text-slate-700 row-amount">¥ {{ record.total_cost }}</span>
                </td>
                <td>
                    <input type="date" name="record_date" class="form-control bg-light" value="{{ record.record_date|date:'Y-m-d' }}" readonly required>
                </td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-link text-primary p-0 me-2 btn-edit-row" title="解锁并修改">
                        <i class="bi bi-pencil-square fs-5"></i>
                    </button>
                    <button type="button" class="btn btn-sm btn-link text-success p-0 me-2 btn-lock-row" style="display: none;" title="锁定行数据">
                        <i class="bi bi-check2-square fs-5"></i>
                    </button>

                    <button type="button" class="btn btn-sm btn-link text-info p-0 me-2 view-history-btn" data-id="{{ record.id }}" title="查看修改历史">
                        <i class="bi bi-clock-history fs-5"></i>
                    </button>

                    <button type="button" class="btn btn-sm btn-link text-danger p-0 delete-labor-row" title="删除此记录">
                        <i class="bi bi-trash fs-5"></i>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<table style="display: none;">
    <tbody id="labor-row-template">
        <tr class="labor-row border-start border-success border-3 shadow-sm bg-white">
            <input type="hidden" name="labor_record_id" value="">
            <td>
                <select name="labor_config_id" class="form-select border-success-subtle labor-calc-trigger" required>
                    <option value="" data-price="0">-- 选择工种 --</option>
                    {% for config in labor_cost_configs %}
                    <option value="{{ config.id }}" data-price="{{ config.price }}">{{ config.label }} (¥{{ config.price }})</option>
                    {% endfor %}
                </select>
            </td>
            <td>
                <input type="number" name="worker_count" class="form-control text-center labor-calc-trigger" value="1" min="1" required>
            </td>
            <td>
                <input type="number" step="0.5" name="work_hours" class="form-control text-center labor-calc-trigger" value="1.0" min="0.5" required>
            </td>
            <td class="text-center">
                <span class="fw-bold text-success row-amount">¥ 0.00</span>
            </td>
            <td>
                <input type="date" name="record_date" class="form-control" value="{% now 'Y-m-d' %}" required>
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-link text-primary p-0 me-2 btn-edit-row" style="display: none;" title="解锁并修改">
                    <i class="bi bi-pencil-square fs-5"></i>
                </button>
                <button type="button" class="btn btn-sm btn-link text-success p-0 me-2 btn-lock-row" title="锁定行数据">
                    <i class="bi bi-check2-square fs-5"></i>
                </button>
                <button type="button" class="btn btn-sm btn-link text-muted p-0 me-2 cursor-not-allowed" title="新记录暂无历史" disabled>
                    <i class="bi bi-clock-history fs-5 opacity-50"></i>
                </button>
                <button type="button" class="btn btn-sm btn-link text-danger p-0 delete-labor-row">
                    <i class="bi bi-trash fs-5"></i>
                </button>
            </td>
        </tr>
    </tbody>
</table>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tbody = document.getElementById('labor-tbody');
        const template = document.getElementById('labor-row-template').querySelector('tr');
        const addBtn = document.getElementById('add-labor-btn');

        // 1. 初始化时，如果没有数据则自动添加一行空行
        if (tbody.querySelectorAll('.labor-row').length === 0) {
            addNewRow(false);
        }

        // 2. 绑定外部“添加”按钮
        if (addBtn) {
            addBtn.style.display = 'inline-block';
            addBtn.addEventListener('click', () => addNewRow(true));
        }

        function addNewRow(animate) {
            const newRow = template.cloneNode(true);
            tbody.appendChild(newRow);
            if (animate) {
                newRow.style.transition = "background-color 0.5s ease";
                newRow.style.backgroundColor = "#d1e7dd";
                setTimeout(() => newRow.style.backgroundColor = "", 800);
            }
        }

        // 3. 事件委托：处理所有的行内按钮点击与计算逻辑
        tbody.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const row = btn.closest('tr');

            // --- 锁定按钮逻辑 ---
            if (btn.classList.contains('btn-lock-row')) {
                const select = row.querySelector('select');
                if(!select.value) {
                    alert("请先选择工种后再锁定行！");
                    return;
                }
                toggleRowState(row, true);
            }

            // --- 解锁/修改按钮逻辑 ---
            else if (btn.classList.contains('btn-edit-row')) {
                toggleRowState(row, false);
            }

            // --- 删除按钮逻辑 ---
            else if (btn.classList.contains('delete-labor-row')) {
                // 要求 2：最少保留一行
                if (tbody.querySelectorAll('.labor-row').length === 1) {
                    alert("必须保留至少一行记录。如无实际投入，可清空数据。");
                    return;
                }

                const recordId = row.querySelector('input[name="labor_record_id"]').value;
                if (recordId) {
                    if(confirm("确定要移除这条已保存的记录吗？（保存工单后正式生效）")) {
                        const form = document.getElementById('productionForm');
                        const deleteInput = document.createElement('input');
                        deleteInput.type = 'hidden';
                        deleteInput.name = 'deleted_labor_records';
                        deleteInput.value = recordId;
                        form.appendChild(deleteInput);
                        row.remove();
                    }
                } else {
                    row.remove();
                }
            }
        });

        // 4. 事件委托：动态计算金额 (监听 input 和 change)
        tbody.addEventListener('input', function(e) {
            if (e.target.classList.contains('labor-calc-trigger')) {
                calculateRowAmount(e.target.closest('tr'));
            }
        });
        tbody.addEventListener('change', function(e) {
            if (e.target.tagName === 'SELECT' && e.target.classList.contains('labor-calc-trigger')) {
                calculateRowAmount(e.target.closest('tr'));
            }
        });

        // 核心辅助方法：切换行的锁定/编辑状态
        function toggleRowState(row, lock) {
            const inputs = row.querySelectorAll('input:not([type="hidden"]), select');
            const editBtn = row.querySelector('.btn-edit-row');
            const lockBtn = row.querySelector('.btn-lock-row');

            if (lock) {
                inputs.forEach(inp => {
                    inp.readOnly = true;
                    if (inp.tagName === 'SELECT') inp.style.pointerEvents = 'none';
                    inp.classList.add('bg-light');
                    inp.classList.remove('border-success-subtle');
                });
                editBtn.style.display = 'inline-block';
                lockBtn.style.display = 'none';
                row.classList.add('is-locked');
                row.classList.remove('border-start', 'border-success', 'border-3', 'shadow-sm', 'bg-white');
            } else {
                inputs.forEach(inp => {
                    inp.readOnly = false;
                    if (inp.tagName === 'SELECT') inp.style.pointerEvents = 'auto';
                    inp.classList.remove('bg-light');
                });
                editBtn.style.display = 'none';
                lockBtn.style.display = 'inline-block';
                row.classList.remove('is-locked');
                row.classList.add('border-start', 'border-success', 'border-3', 'shadow-sm', 'bg-white');
            }
        }

        // 核心辅助方法：计算单行总金额
        function calculateRowAmount(row) {
            const count = parseFloat(row.querySelector('input[name="worker_count"]').value) || 0;
            const hours = parseFloat(row.querySelector('input[name="work_hours"]').value) || 0;
            const select = row.querySelector('select[name="labor_config_id"]');

            let price = 0;
            if (select.selectedIndex >= 0) {
                // 从 Option 绑定的 data-price 属性中取值
                price = parseFloat(select.options[select.selectedIndex].getAttribute('data-price')) || 0;
            }

            const total = (count * hours * price).toFixed(2);
            row.querySelector('.row-amount').textContent = '¥ ' + total;
        }
    });
</script>

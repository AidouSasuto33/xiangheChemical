<div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="labor-table">
        <thead class="table-light text-secondary">
            <tr>
                <th style="width: 25%">工种 / 费用项</th>
                <th style="width: 12%" class="text-center">人数</th>
                <th style="width: 15%" class="text-center">耗时 (H)</th>
                <th style="width: 15%" class="text-center">金额 (元)</th>
                <th style="width: 15%">记录日期</th>
                <th style="width: 18%" class="text-center">操作</th>
            </tr>
        </thead>
        <tbody id="labor-tbody">
            {% for record in labor_records %}
            <tr class="labor-row is-locked">
                <input type="hidden" name="labor_record_id" value="{{ record.id }}">
                <td>
                    <select name="labor_config_id" class="form-select bg-light labor-calc-trigger" style="pointer-events: none;">
                        <option value="{{ record.cost_config.id }}" data-price="{{ record.cost_snapshot }}" selected>{{ record.cost_config.label }}</option>
                        {% for config in labor_cost_configs %}<option value="{{ config.id }}" data-price="{{ config.price }}">{{ config.label }}</option>{% endfor %}
                    </select>
                </td>
                <td><input type="number" name="worker_count" class="form-control text-center bg-light labor-calc-trigger" value="{{ record.worker_count }}" readonly></td>
                <td><input type="number" step="0.5" name="work_hours" class="form-control text-center bg-light labor-calc-trigger" value="{{ record.work_hours }}" readonly></td>
                <td class="text-center"><span class="fw-bold text-slate-700 row-amount">¥ {{ record.total_cost }}</span></td>
                <td><input type="date" name="record_date" class="form-control bg-light" value="{{ record.record_date|date:'Y-m-d' }}" readonly></td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-link text-primary p-0 me-2 btn-edit-row"><i class="bi bi-pencil-square fs-5"></i></button>
                    <button type="button" class="btn btn-sm btn-link text-success p-0 me-2 btn-lock-row" style="display: none;"><i class="bi bi-check2-square fs-5"></i></button>
                    <button type="button" class="btn btn-sm btn-link text-info p-0 me-2 view-history-btn" data-id="{{ record.id }}"><i class="bi bi-clock-history fs-5"></i></button>
                    <button type="button" class="btn btn-sm btn-link text-danger p-0 delete-labor-row"><i class="bi bi-trash fs-5"></i></button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<table style="display: none;">
    <tbody id="labor-row-template">
        <tr class="labor-row border-start border-success border-3 shadow-sm bg-white">
            <input type="hidden" name="labor_record_id" value="">
            <td>
                <select name="labor_config_id" class="form-select border-success-subtle labor-calc-trigger">
                    <option value="" data-price="0">-- 选择工种 --</option>
                    {% for config in labor_cost_configs %}
                    <option value="{{ config.id }}" data-price="{{ config.price }}">{{ config.label }} (¥{{ config.price }})</option>
                    {% endfor %}
                </select>
            </td>
            <td><input type="number" name="worker_count" class="form-control text-center labor-calc-trigger" value="1"></td>
            <td><input type="number" step="0.5" name="work_hours" class="form-control text-center labor-calc-trigger" value="1.0"></td>
            <td class="text-center"><span class="fw-bold text-success row-amount">¥ 0.00</span></td>
            <td><input type="date" name="record_date" class="form-control" value="{% now 'Y-m-d' %}"></td>
            <td class="text-center">
                <button type="button" class="btn btn-sm btn-link text-success p-0 me-2 btn-lock-row"><i class="bi bi-check2-square fs-5"></i></button>
                <button type="button" class="btn btn-sm btn-link text-danger p-0 delete-labor-row"><i class="bi bi-trash fs-5"></i></button>
            </td>
        </tr>
    </tbody>
</table>

<script>
    // JS 逻辑保持不变，但增加防呆判断
    document.addEventListener("DOMContentLoaded", function () {
        const tbody = document.getElementById('labor-tbody');
        const template = document.getElementById('labor-row-template').querySelector('tr');
        const addBtn = document.getElementById('add-labor-btn');

        if (tbody && tbody.querySelectorAll('.labor-row').length === 0) addNewRow(false);
        if (addBtn) { addBtn.style.display = 'inline-block'; addBtn.onclick = () => addNewRow(true); }

        function addNewRow(animate) {
            const newRow = template.cloneNode(true);
            tbody.appendChild(newRow);
            if (animate) { newRow.classList.add('animate__animated', 'animate__fadeInDown'); }
        }

        tbody.addEventListener('click', function(e) {
            const btn = e.target.closest('button'); if (!btn) return;
            const row = btn.closest('tr');
            if (btn.classList.contains('btn-lock-row')) toggleRowState(row, true);
            else if (btn.classList.contains('btn-edit-row')) toggleRowState(row, false);
            else if (btn.classList.contains('delete-labor-row')) {
                if (tbody.querySelectorAll('.labor-row').length > 1) row.remove();
                else alert("请至少保留一行人工投入记录。");
            }
        });

        tbody.addEventListener('input', e => { if (e.target.classList.contains('labor-calc-trigger')) calculate(e.target.closest('tr')); });
        tbody.addEventListener('change', e => { if (e.target.tagName === 'SELECT') calculate(e.target.closest('tr')); });

        function toggleRowState(row, lock) {
            row.querySelectorAll('input, select').forEach(i => {
                i.readOnly = lock;
                if(i.tagName==='SELECT') i.style.pointerEvents = lock ? 'none' : 'auto';
                lock ? i.classList.add('bg-light') : i.classList.remove('bg-light');
            });
            row.querySelector('.btn-edit-row') && (row.querySelector('.btn-edit-row').style.display = lock ? 'inline-block' : 'none');
            row.querySelector('.btn-lock-row').style.display = lock ? 'none' : 'inline-block';
        }

        function calculate(row) {
            const c = parseFloat(row.querySelector('[name=worker_count]').value) || 0;
            const h = parseFloat(row.querySelector('[name=work_hours]').value) || 0;
            const s = row.querySelector('select');
            const p = parseFloat(s.options[s.selectedIndex]?.dataset.price) || 0;
            row.querySelector('.row-amount').textContent = '¥ ' + (c * h * p).toFixed(2);
        }
    });
</script>

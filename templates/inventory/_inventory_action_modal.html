<div class="modal fade" id="inventoryActionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" action="{% url 'inventory:inventory_action' %}">
                {% csrf_token %}

                <input type="hidden" name="inventory_id" id="modal_inventory_id">
                <input type="hidden" name="action_type" id="modal_action_type">

                <div class="modal-header text-white" id="modal_header_bg">
                    <h5 class="modal-title">
                        <span id="modal_action_label">操作</span> -
                        <span id="modal_item_name" class="fw-bold"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label for="modal_amount" class="form-label fw-bold" id="modal_amount_label">数量</label>
                        <div class="input-group">
                            <input type="number" step="0.01" name="amount" id="modal_amount" class="form-control form-control-lg" required>
                            <span class="input-group-text" id="modal_unit_display">kg</span>
                        </div>
                        <div class="form-text text-muted" id="modal_help_text"></div>
                    </div>

                    <div class="mb-3">
                        <label for="modal_note" class="form-label">备注 / 原因</label>
                        <textarea name="note" id="modal_note" class="form-control" rows="2" placeholder="例：新货入库、车间领料、盘点修正..."></textarea>
                    </div>
                </div>

                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary" id="modal_submit_btn">确认提交</button>
                </div>
            </form>
        </div>
    </div>
</div>

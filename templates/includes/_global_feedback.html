<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;">
    <div id="globalSuccessToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fs-6">
                <span class="me-2">✅</span>
                <span id="toastMessageText">操作成功</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="modal fade" id="globalErrorModal" tabindex="-1" aria-hidden="true" style="z-index: 1070;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <span>⚠️ 操作受阻</span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex align-items-start">
                    <div class="flex-shrink-0">
                        <svg width="32" height="32" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h5 class="text-danger mb-2">出错了</h5>
                        <p class="text-secondary mb-0" id="modalErrorMessageText">系统检测到异常，请检查输入。</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer bg-light p-2">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">知道了</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. 初始化 Bootstrap 组件实例
    const toastEl = document.getElementById('globalSuccessToast');
    const modalEl = document.getElementById('globalErrorModal');

    const toastInstance = new bootstrap.Toast(toastEl, { delay: 3000 }); // 3秒自动消失
    const modalInstance = new bootstrap.Modal(modalEl);

    // ==========================================
    // ⭐ 核心改造：将方法暴露给 window 全局对象
    // ==========================================
    window.showGlobalSuccess = function(message) {
        document.getElementById('toastMessageText').innerText = message;
        toastInstance.show();
    };

    window.showGlobalError = function(message) {
        document.getElementById('modalErrorMessageText').innerText = message;
        modalInstance.show();
    };

    // 2. 获取 Django 后端传过来的消息列表
    const djangoMessages = [
        {% for message in messages %}
        {
            "level": "{{ message.tags }}",
            "text": "{{ message|escapejs }}"
        },
        {% endfor %}
    ];

    // 3. 循环处理 Django 消息，直接调用我们刚封装好的全局 API
    if (djangoMessages.length > 0) {
        djangoMessages.forEach(msg => {
            if (msg.level.includes('success') || msg.level.includes('info')) {
                window.showGlobalSuccess(msg.text);
            } else if (msg.level.includes('error') || msg.level.includes('warning')) {
                window.showGlobalError(msg.text);
            }
        });
    }
});
</script>
